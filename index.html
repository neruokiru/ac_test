<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高機能版・料金シミュレーター</title>
<meta name="robots" content="noindex, nofollow">
<style>
  /* ベース設定 */
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background-color: #f4f5f7;
    color: #333;
    padding: 20px;
  }
  .simulator-container {
    background: #fff;
    border-radius: 12px;
    padding: 24px 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    max-width: 480px;
    margin: 0 auto;
  }
  .sim-title {
    text-align: center;
    font-size: 1.2rem;
    font-weight: bold;
    margin-bottom: 24px;
    color: #000;
  }
  
  /* ステップデザイン */
  .step-box { margin-bottom: 24px; }
  .step-label {
    font-weight: bold;
    font-size: 0.95rem;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
  }
  .step-badge {
    background: #005bac;
    color: #fff;
    font-size: 0.75rem;
    padding: 2px 8px;
    border-radius: 10px;
    margin-right: 8px;
  }

  /* 選択ボタン（ラジオ） */
  .radio-group {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .radio-group input[type="radio"] { display: none; }
  .radio-group label {
    flex: 1;
    min-width: 30%;
    text-align: center;
    padding: 12px 4px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: bold;
    color: #666;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .radio-group input[type="radio"]:checked + label {
    border-color: #005bac;
    background-color: #f0f7ff;
    color: #005bac;
  }

  /* セレクトボックス（初期非表示用クラス含む） */
  .sim-select {
    width: 100%;
    padding: 12px;
    border: 2px solid #ddd;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: bold;
    color: #333;
    appearance: none;
    background: #fff url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23666%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E') no-repeat right 15px top 50%;
    background-size: 12px auto;
  }
  .hidden-step {
    display: none;
    animation: fadeInDown 0.3s ease forwards;
  }
  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 計算ボタン */
  .calc-btn {
    width: 100%;
    background: #ff5a00;
    color: #fff;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 16px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 0 #cc4800;
    transition: transform 0.1s, box-shadow 0.1s;
    margin-bottom: 24px;
  }
  .calc-btn:active {
    transform: translateY(4px);
    box-shadow: 0 0 0 #cc4800;
  }

  /* 結果エリア */
  .result-area {
    display: none;
    border-top: 2px dashed #ddd;
    padding-top: 24px;
    animation: fadeInDown 0.5s ease forwards;
  }
  
  /* CBトグルスイッチ */
  .toggle-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fdf5e6;
    padding: 12px 16px;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px solid #ffcc00;
  }
  .toggle-label {
    font-size: 0.85rem;
    font-weight: bold;
    color: #d10000;
  }
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 28px;
  }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    cursor: pointer;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: #ccc;
    transition: .4s;
    border-radius: 34px;
  }
  .slider:before {
    position: absolute;
    content: "";
    height: 20px; width: 20px;
    left: 4px; bottom: 4px;
    background-color: white;
    transition: .4s;
    border-radius: 50%;
  }
  input:checked + .slider { background-color: #ff5a00; }
  input:checked + .slider:before { transform: translateX(22px); }

  /* 料金表示ボックス */
  .result-box {
    background: #fff;
    border: 3px solid #005bac;
    border-radius: 8px;
    padding: 20px 16px;
    text-align: center;
    margin-bottom: 20px;
    position: relative;
  }
  .result-label {
    font-size: 0.95rem;
    color: #005bac;
    font-weight: bold;
    margin-bottom: 8px;
  }
  .result-price {
    font-size: 2.8rem;
    font-weight: bold;
    color: #333;
    line-height: 1;
  }
  .result-price span {
    font-size: 1.2rem;
  }
  .total-note {
    font-size: 0.75rem;
    color: #666;
    margin-top: 8px;
  }

  /* 内訳リスト */
  .breakdown {
    list-style: none;
    padding: 0;
    margin: 0 0 24px 0;
    font-size: 0.9rem;
    color: #555;
  }
  .breakdown li {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    border-bottom: 1px solid #eee;
  }
  .breakdown li.discount { color: #d10000; font-weight: bold; }
  .breakdown li.sum { color: #005bac; font-weight: bold; border-top: 2px solid #ddd; margin-top: 4px; padding-top: 12px;}

  /* 最終CVボタン */
  .cv-btn {
    width: 100%;
    background: #005bac;
    color: #fff;
    font-size: 1.1rem;
    font-weight: bold;
    padding: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="simulator-container">
  <div class="sim-title">通信費トータル・シミュレーター</div>

  <div class="step-box">
    <div class="step-label"><span class="step-badge">STEP 1</span> お住まいのタイプ</div>
    <div class="radio-group">
      <input type="radio" name="house_type" id="type_mansion" value="4180" checked>
      <label for="type_mansion">集合住宅</label>
      <input type="radio" name="house_type" id="type_family" value="5720">
      <label for="type_family">戸建て</label>
    </div>
  </div>

  <div class="step-box">
    <div class="step-label"><span class="step-badge">STEP 2</span> ご利用中のスマホ</div>
    <div class="radio-group">
      <input type="radio" name="carrier" id="c_sb" value="1100" onclick="toggleFamilyStep()">
      <label for="c_sb">SoftBank</label>
      <input type="radio" name="carrier" id="c_ym" value="1188" onclick="toggleFamilyStep()">
      <label for="c_ym">Y!mobile</label>
      <input type="radio" name="carrier" id="c_none" value="0" onclick="toggleFamilyStep()">
      <label for="c_none">その他・なし</label>
    </div>
  </div>

  <div class="step-box hidden-step" id="family_step">
    <div class="step-label"><span class="step-badge">STEP 3</span> ご家族も含めた利用台数</div>
    <select id="phone_count" class="sim-select">
      <option value="1">1台（ご本人のみ）</option>
      <option value="2">2台</option>
      <option value="3">3台</option>
      <option value="4">4台</option>
      <option value="5">5台以上</option>
    </select>
  </div>

  <button type="button" class="calc-btn" onclick="calculatePrice()">シミュレーション結果を見る</button>

  <div id="result_area" class="result-area">
    
    <div class="toggle-container">
      <div class="toggle-label">🎁 新規3万円キャッシュバック<br><span style="font-size:0.7rem; color:#888;">(月額実質2,500円割引として計算)</span></div>
      <label class="toggle-switch">
        <input type="checkbox" id="cb_toggle" checked onchange="updateResult()">
        <span class="slider"></span>
      </label>
    </div>

    <div class="result-box">
      <div class="result-label">家計全体の「実質」月額負担額</div>
      <div class="result-price" id="display_total">--<span>円</span></div>
      <div class="total-note">※光回線とスマホ割を合算した通信費トータルの目安です</div>
    </div>

    <ul class="breakdown">
      <li><span>ネット基本料金</span><span id="display_base">--円</span></li>
      <li class="discount"><span>📱 スマホセット割（おうち割）</span><span id="display_discount">-0円</span></li>
      <li class="discount" id="cb_row"><span>🎁 CB特典（12ヶ月換算）</span><span id="display_cb">-2,500円</span></li>
    </ul>

    <button type="button" class="cv-btn">この条件で詳細見積もりへ進む</button>
  </div>
</div>

<script>
  // STEP2で「SoftBank」か「Y!mobile」を選んだ時だけSTEP3を表示
  function toggleFamilyStep() {
    const carrier = document.querySelector('input[name="carrier"]:checked');
    const familyStep = document.getElementById('family_step');
    
    // SBかYMが選ばれていれば表示、それ以外（なし・未選択）なら非表示
    if (carrier && parseInt(carrier.value) > 0) {
      familyStep.style.display = 'block';
    } else {
      familyStep.style.display = 'none';
      document.getElementById('phone_count').value = "1"; // リセット
    }
  }

  // 初回計算処理（ボタン押下時）
  function calculatePrice() {
    // キャリアが未選択の場合はアラート
    if (!document.querySelector('input[name="carrier"]:checked')) {
      alert('ご利用中のスマホを選択してください。');
      return;
    }
    
    updateResult(); // 計算＆描画
    
    const resultArea = document.getElementById('result_area');
    resultArea.style.display = 'block';
    resultArea.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // 計算ロジック本体（トグル切り替え時にも発火）
  function updateResult() {
    // 1. 各項目の値を取得
    const basePrice = parseInt(document.querySelector('input[name="house_type"]:checked').value);
    const carrierInput = document.querySelector('input[name="carrier"]:checked');
    const carrierDiscount = carrierInput ? parseInt(carrierInput.value) : 0;
    
    // 台数の取得（「なし」の場合は強制0台）
    const phoneCount = carrierDiscount > 0 ? parseInt(document.getElementById('phone_count').value) : 0;
    
    // CBトグルの状態
    const isCbChecked = document.getElementById('cb_toggle').checked;
    
    // 2. 割引額の計算（※金額はダミー：SB=1100, YM=1188として設定済み）
    const totalOuchiWari = carrierDiscount * phoneCount;
    const cbDiscount = isCbChecked ? 2500 : 0;
    
    // トータル実質負担（マイナスにならないよう制御）
    let totalRealPrice = basePrice - totalOuchiWari - cbDiscount;
    if (totalRealPrice < 0) totalRealPrice = 0;

    // 3. 画面への描画
    document.getElementById('display_base').innerText = basePrice.toLocaleString() + '円';
    document.getElementById('display_discount').innerText = '-' + totalOuchiWari.toLocaleString() + '円';
    
    // CBの表示切り替え
    const cbRow = document.getElementById('cb_row');
    if (isCbChecked) {
      cbRow.style.display = 'flex';
      document.getElementById('display_cb').innerText = '-2,500円';
    } else {
      cbRow.style.display = 'none';
    }

    // 合計金額の描画
    document.getElementById('display_total').innerHTML = totalRealPrice.toLocaleString() + '<span>円</span>';
  }
</script>

</body>
</html>
